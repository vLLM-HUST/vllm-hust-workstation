name: Self-Hosted Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: workstation-self-hosted-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build and restart workstation service
        run: ./scripts/deploy_workstation.sh ci-deploy

      - name: Show workstation service status
        if: always()
        run: ./scripts/deploy_workstation.sh status || true