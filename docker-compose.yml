services:
  workstation:
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # vllm-hust-gateway endpoint (OpenAI-compatible)
      VLLM_HUST_BASE_URL: ${VLLM_HUST_BASE_URL:-http://host.docker.internal:8080}
      VLLM_HUST_API_KEY: ${VLLM_HUST_API_KEY:-not-required}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-default}
      BACKEND_TYPE: ${BACKEND_TYPE:-Ascend NPU}
      # White-label branding
      APP_BRAND_NAME: ${APP_BRAND_NAME:-vLLM-HUST 工作站}
      APP_BRAND_LOGO: ${APP_BRAND_LOGO:-}
      APP_ACCENT_COLOR: ${APP_ACCENT_COLOR:-#6366f1}
      APP_FRAME_ANCESTORS: ${APP_FRAME_ANCESTORS:-}
      # Replicate to NEXT_PUBLIC_* for client-side
      NEXT_PUBLIC_BRAND_NAME: ${APP_BRAND_NAME:-vLLM-HUST 工作站}
      NEXT_PUBLIC_BRAND_LOGO: ${APP_BRAND_LOGO:-}
      NEXT_PUBLIC_ACCENT_COLOR: ${APP_ACCENT_COLOR:-#6366f1}
    restart: always
    extra_hosts:
      # So "host.docker.internal" resolves on Linux too
      - "host.docker.internal:host-gateway"
